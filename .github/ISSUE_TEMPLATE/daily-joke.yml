name: Daily joke submission
description: Created by The Office of Interim Comedy application.
title: "Daily joke: YYYY-MM-DD"
labels:
  - daily-joke
body:
  - type: markdown
    attributes:
      value: |
        This issue type is normally generated by the static application.
        The automation reads only the deterministic marker block in the issue body and trusts only your authenticated GitHub username.
  - type: input
    id: date
    attributes:
      label: Submission date
      description: Use YYYY-MM-DD.
      placeholder: "2026-07-27"
    validations:
      required: true
  - type: dropdown
    id: joke-type
    attributes:
      label: Joke type
      options:
        - single
        - setup-punchline
    validations:
      required: true
  - type: textarea
    id: joke
    attributes:
      label: Joke body
      description: Prefer using the app so the machine-readable block is created correctly.
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand this issue will be validated by the Department of Joke Continuity.
          required: true
